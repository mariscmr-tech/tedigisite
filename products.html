<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản Phẩm - TedigiVN</title>
    
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/products.css">
    
    <script src="js/config.js"></script>
    <style>
        /* Tối ưu màu sắc đồng bộ với Logo mới */
        :root {
            --p-blue: #1E5BB1;
            --p-red: #D61A3C;
        }
        .category-title {
            color: var(--p-blue);
            border-left: 5px solid var(--p-red);
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .active-cat {
            color: var(--p-red) !important;
            font-weight: bold;
        }
        .btn-confirm-add {
            background: var(--p-blue) !important;
            transition: 0.3s;
        }
        .btn-confirm-add:hover {
            background: var(--p-red) !important;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container product-page-layout" style="margin-top: 20px; display: flex; gap: 30px;">
        
        <aside class="sidebar" style="width: 250px; flex-shrink: 0;">
            <h3 style="font-size: 18px; margin-bottom: 15px; color: var(--p-blue);">DANH MỤC</h3>
            <ul class="cat-list" style="list-style: none; padding: 0;">
                <li style="margin-bottom: 10px;"><a href="?cat=all" id="link-all" class="nav-link">Tất cả sản phẩm</a></li>
                <li style="margin-bottom: 10px;"><a href="?cat=pos" id="link-pos" class="nav-link">Máy POS bán hàng</a></li>
                <li style="margin-bottom: 10px;"><a href="?cat=bill" id="link-bill" class="nav-link">Máy in hóa đơn</a></li>
                <li style="margin-bottom: 10px;"><a href="?cat=scan" id="link-scan" class="nav-link">Máy quét mã vạch</a></li>
                <li style="margin-bottom: 10px;"><a href="?cat=print" id="link-print" class="nav-link">Máy in công nghiệp</a></li>
                <li style="margin-bottom: 10px;"><a href="?cat=cashdrawer" id="link-cashdrawer" class="nav-link">Ngăn kéo đựng tiền</a></li>
            </ul>
        </aside>

        <main class="main-content" style="flex-grow: 1;">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="category-title" id="category-title">Sản Phẩm</h2>
                <div class="product-count" id="product-count" style="font-size: 14px; color: #888;">Đang tải...</div>
            </div>

            <div id="loading" style="text-align: center; padding: 50px; color: #888;">
                <div class="spinner"></div> ⏳ Đang kết nối dữ liệu kho...
            </div>

            <div class="product-grid" id="product-container"></div>
        </main>
    </div>

    <div id="qtyModal" class="modal">
        <div class="modal-content" style="text-align: center; max-width: 400px; margin: auto;">
            <span class="close-btn" onclick="closeQtyModal()">&times;</span>
            <img id="m-img" src="" class="modal-img" style="width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px;">
            <div class="modal-title" id="m-title" style="font-weight: bold; font-size: 18px;">Tên SP</div>
            <div class="modal-price" id="m-price" style="color: var(--p-red); font-size: 20px; margin: 10px 0;">0 đ</div>
            <p style="font-size: 13px; color: #666;">Số lượng còn trong kho: <b id="m-stock">0</b></p>
            
            <div class="qty-wrapper" style="display: flex; justify-content: center; align-items: center; gap: 10px; margin: 20px 0;">
                <button class="qty-btn" onclick="changeQty(-1)" style="width: 35px; height: 35px; border: 1px solid #ddd; cursor: pointer;">-</button>
                <input type="text" id="m-qty" class="qty-input" value="1" readonly style="width: 50px; text-align: center; border: 1px solid #ddd; height: 35px;">
                <button class="qty-btn" onclick="changeQty(1)" style="width: 35px; height: 35px; border: 1px solid #ddd; cursor: pointer;">+</button>
            </div>
            
            <button class="btn-confirm-add" onclick="confirmAddToCart()" style="width: 100%; padding: 12px; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">XÁC NHẬN THÊM VÀO GIỎ</button>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
