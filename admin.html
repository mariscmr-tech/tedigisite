<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Trị - TedigiVN</title>
    
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/admin.css">
    
    <script src="js/config.js"></script>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container" style="margin-top: 20px;">
        <div class="admin-welcome-bar" style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <div style="font-size: 16px;">👤 Chào mừng, <b id="display-name-header" style="color: var(--primary-blue);">User</b></div>
            <div style="display: flex; gap: 10px;">
                <button onclick="window.location.href='index.html'" style="padding: 8px 15px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s;">Xem Website</button>
                <button class="btn-logout" onclick="logout()" style="background: #D61A3C; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s;">Đăng xuất</button>
            </div>
        </div>

        <div class="tab-menu" id="adminTabs">
            <button class="tab-btn" onclick="switchTab('add-tab')" id="btn-add-tab">➕ Nhập SP Mới</button>
            <button class="tab-btn" onclick="switchTab('manage-tab')" id="btn-manage-tab">📦 Quản Lý Kho</button>
            <button class="tab-btn" onclick="switchTab('order-tab')" id="btn-order-tab">📝 Đơn Hàng</button>
        </div>

        <div class="card tab-content" id="add-tab">
            <h2 id="form-title">Đăng Sản Phẩm Mới</h2>
            <form id="addForm">
                <div class="form-grid">
                    <div class="form-group"><label>Tên sản phẩm *</label><input type="text" id="pName" required></div>
                    <div class="form-group"><label>Mã máy (SKU)</label><input type="text" id="pCode"></div>
                    <div class="form-group"><label>Giá bán (VNĐ) *</label><input type="number" id="pPrice" required></div>
                    <div class="form-group"><label>Số lượng tồn kho</label><input type="number" id="pStock" value="0" min="0"></div>
                    <div class="form-group">
                        <label>Danh mục *</label>
                        <select id="pCategory">
                            <option value="Máy POS bán hàng">Máy POS bán hàng</option>
                            <option value="Máy in bill">Máy in hóa đơn</option>
                            <option value="Máy quét mã vạch">Máy quét mã vạch</option>
                            <option value="Máy in công nghiệp">Máy in công nghiệp</option>
                            <option value="Ngăn kéo đựng tiền">Ngăn kéo đựng tiền</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Trạng thái kinh doanh</label>
                        <select id="pBizStatus">
                            <option value="Đang kinh doanh">✅ Đang KD</option>
                            <option value="Ngừng kinh doanh">❌ Ngừng KD</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Hình ảnh sản phẩm (Link URL) *</label>
                        <div id="image-container">
                            <div class="dynamic-input-row">
                                <input type="url" class="pImageInput" placeholder="Nhập link ảnh..." required>
                                <button type="button" class="btn-remove-row" onclick="this.parentElement.remove()">❌</button>
                            </div>
                        </div>
                        <button type="button" class="btn-add-row" onclick="addImageRow()" style="margin-top: 10px;">+ Thêm ảnh khác</button>
                    </div>

                    <div class="form-group full-width">
                        <label>Thông số kỹ thuật</label>
                        <div id="specs-container">
                            <div class="dynamic-input-row">
                                <input type="text" class="pSpecName" placeholder="Tên thông số (VD: CPU)">
                                <input type="text" class="pSpecValue" placeholder="Giá trị (VD: Intel Core i5)">
                                <button type="button" class="btn-remove-row" onclick="this.parentElement.remove()">❌</button>
                            </div>
                        </div>
                        <button type="button" class="btn-add-row" onclick="addSpecRow()" style="margin-top: 10px;">+ Thêm dòng thông số</button>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Mô tả ngắn</label>
                        <textarea id="pDesc" rows="3" placeholder="Nhập mô tả tóm tắt..."></textarea>
                    </div>
                </div>
                
                <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                    <button type="submit" class="btn-submit" id="addBtn" style="background: var(--primary-blue); color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: bold;">Lưu Sản Phẩm</button>
                    <button type="button" class="btn-cancel-edit" id="cancelEditBtn" onclick="cancelEdit()" style="display:none; background: #95a5a6; color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer;">Hủy Chỉnh Sửa</button>
                </div>
                <p id="addStatus" style="text-align: center; font-weight: bold; margin-top: 15px;"></p>
            </form>
        </div>

        <div class="card tab-content" id="manage-tab">
            <h2 style="display: flex; justify-content: space-between; align-items: center;">
                Quản Lý Kho Hàng 
                <span class="badge bg-approved" id="product-count" style="background: var(--primary-blue); padding: 5px 15px; border-radius: 20px; font-size: 14px;">0</span>
            </h2>
            <div class="filter-bar" style="margin-bottom: 20px;">
                <input type="text" id="searchProductInput" placeholder="🔍 Tìm nhanh theo tên hoặc mã máy..." onkeyup="filterProducts()" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div id="product-list">
                <p style="text-align: center; color: #666;">⏳ Đang tải dữ liệu sản phẩm...</p>
            </div>
        </div>

        <div class="card tab-content" id="order-tab">
            <h2 style="display: flex; justify-content: space-between; align-items: center;">
                Danh Sách Đơn Hàng 
                <span class="badge bg-success" id="order-count" style="background: var(--primary-red); padding: 5px 15px; border-radius: 20px; font-size: 14px;">0</span>
            </h2>
            <div class="filter-bar" style="margin-bottom: 20px;">
                <input type="text" id="searchOrderInput" placeholder="🔍 Tìm đơn theo SĐT hoặc mã đơn..." onkeyup="filterOrders()" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div id="order-list">
                <p style="text-align: center; color: #666;">⏳ Đang đồng bộ đơn hàng...</p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
