<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - TedigiVN</title>
    
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/cart.css">
    
    <script src="js/config.js"></script>
    <style>
        /* Tối ưu màu sắc theo Logo Phoenix */
        :root {
            --p-blue: #1E5BB1;
            --p-red: #D61A3C;
        }
        .page-title {
            color: var(--p-blue);
            border-bottom: 2px solid var(--p-red);
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 30px;
        }
        .btn-order {
            background-color: var(--p-red) !important;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-order:hover {
            background-color: var(--p-blue) !important;
            transform: translateY(-2px);
        }
        .total-price {
            color: var(--p-red);
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container" style="margin-top: 30px; min-height: 60vh;">
        <h2 class="page-title">🛒 Giỏ Hàng Của Bạn</h2>
        
        <div class="cart-layout" style="display: grid; grid-template-columns: 1fr 350px; gap: 30px;">
            <div class="cart-list" id="cartItemsContainer">
                <div style="text-align: center; padding: 50px; color: #888;">
                    ⌛ Đang kiểm tra giỏ hàng...
                </div>
            </div>

            <div class="checkout-box" id="checkoutSection" style="background: #f9f9f9; padding: 25px; border-radius: 8px; height: fit-content; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                <h3 style="margin-top: 0; color: var(--p-blue);">Thông tin thanh toán</h3>
                <div class="total-row" style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding: 15px 0; border-top: 1px solid #ddd;">
                    <span style="font-weight: bold;">Tổng cộng:</span>
                    <span class="total-price" id="totalAmountDisplay">0 đ</span>
                </div>
                
                <form id="orderForm">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-size: 14px;">Họ và Tên người nhận *</label>
                        <input type="text" id="cName" required placeholder="Nhập họ tên..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-size: 14px;">Số điện thoại *</label>
                        <input type="tel" id="cPhone" required placeholder="09xxxx..." pattern="[0-9]{10,11}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px; font-size: 14px;">Địa chỉ giao hàng *</label>
                        <textarea id="cAddress" required rows="3" placeholder="Số nhà, Phường/Xã, Quận/Huyện..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; resize: none;"></textarea>
                    </div>
                    <button type="submit" class="btn-order" id="submitOrderBtn" style="width: 100%; padding: 15px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">XÁC NHẬN ĐẶT HÀNG</button>
                    <p id="orderStatus" style="text-align: center; margin-top: 10px; font-weight: bold;"></p>
                </form>
            </div>
        </div>
    </div>

    <div id="successModal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 9999;">
        <div class="modal-content" style="background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 450px; width: 90%;">
            <div style="font-size: 50px; color: #28a745; margin-bottom: 15px;">🎉</div>
            <h2 style="color: #28a745; margin-top: 0;">Đặt hàng thành công!</h2>
            <p style="margin: 15px 0;">Mã đơn hàng: <b id="orderCodeDisplay" style="color: var(--p-red); font-size: 1.2rem;"></b></p>
            <p style="font-size: 0.9rem; color: #666;">Nhân viên TedigiVN sẽ gọi điện xác nhận trong thời gian sớm nhất.</p>
            <a href="products.html?cat=all" class="btn-home" style="background: var(--p-blue); color: white; padding: 12px 25px; text-decoration: none; border-radius: 4px; display: inline-block; margin-top: 20px; font-weight: bold;">Tiếp tục mua sắm</a>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
